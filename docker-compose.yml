version: '3.8'

services:
  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lightcrm
    volumes:
      - ./database/migration.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
      image: node:20-alpine
      container_name: lightcrm_frontend
      volumes:
        - ./frontend:/app
        - /app/node_modules
      working_dir: /app
      ports:
        - "5173:5173"
      command: sh -c "npm install && npm run dev -- --host"
      environment:
        - WATCHPACK_POLLING=true

volumes:
  db_data: